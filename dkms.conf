PACKAGE_NAME="ipu-camera-sensor"
PACKAGE_VERSION="0.1"
VERSION_SUFFIX="${PACKAGE_VERSION}"

MAKE="make KERNELRELEASE=$kernelver DRIVER_VERSION_SUFFIX='${VERSION_SUFFIX}' KERNEL_SRC=$kernel_source_dir"
CLEAN="make KERNELRELEASE=$kernelver KERNEL_SRC=$kernel_source_dir clean"

AUTOINSTALL="yes"

BUILD_EXCLUSIVE_KERNEL="^(6\.(1[278])\.)|^6\.(1[27])rt-intel|^6\.(1[27])-intel"
KERNEL_VER=$(echo $kernelver | cut -d. -f1)
KERNEL_PATCH=$(echo $kernelver | cut -d. -f2 | cut -d- -f1)

MODULE_PATH="drivers/media/i2c"
MODULE_DEST="/kernel/drivers/media/i2c/"

POST_ADD="dkms-kernel-source.sh"

j=0

# Patches for 6.17 kernel

# V4l2 core patches
POST_ADD+=" drivers/media/v4l2-core"
PATCH[$j]="0004-dkms-v4l2-core-makefile-adaptation-6.17.patch"
PATCH_MATCH[$j]="^(6.1[7])"
PATCH[$((++j))]="0005-drivers-media-set-v4l2_subdev_enable_streams_api-tru.patch"
PATCH_MATCH[$j]="^(6.1[7])"
PATCH[$((++j))]="0009-dkms-disable-tuner-build-in-v4l2-core-6.17.patch"
PATCH_MATCH[$j]="^(6.1[7])"

# IPU6 drivers
PATCH[$((++j))]="0052-module-version-conditional-symbol-namespace.patch"
PATCH_MATCH[$j]="^(6.1[27])"
PATCH[$((++j))]="0053-ipu6-isys-disable-src_pad-validation-for-dkms.patch"
PATCH_MATCH[$j]="^(6.1[7])"

i=0

BUILT_MODULE_NAME[$i]="ipu-acpi"
BUILT_MODULE_LOCATION[$i]="drivers/media/platform/intel"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

BUILT_MODULE_NAME[$((++i))]="ipu-acpi-pdata"
BUILT_MODULE_LOCATION[$i]="drivers/media/platform/intel"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

BUILT_MODULE_NAME[$((++i))]="ipu-acpi-common"
BUILT_MODULE_LOCATION[$i]="drivers/media/platform/intel"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

BUILT_MODULE_NAME[$((++i))]="ar0233"
BUILT_MODULE_LOCATION[$i]="drivers/media/i2c"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

BUILT_MODULE_NAME[$((++i))]="ar0234"
BUILT_MODULE_LOCATION[$i]="drivers/media/i2c"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

BUILT_MODULE_NAME[$((++i))]="ar0830"
BUILT_MODULE_LOCATION[$i]="drivers/media/i2c"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

BUILT_MODULE_NAME[$((++i))]="ar0820"
BUILT_MODULE_LOCATION[$i]="drivers/media/i2c"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

BUILT_MODULE_NAME[$((++i))]="isx031"
BUILT_MODULE_LOCATION[$i]="drivers/media/i2c"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

BUILT_MODULE_NAME[$((++i))]="max9x"
BUILT_MODULE_LOCATION[$i]="drivers/media/i2c/max9x"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

BUILT_MODULE_NAME[$((++i))]="lt6911uxc"
BUILT_MODULE_LOCATION[$i]="drivers/media/i2c"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

BUILT_MODULE_NAME[$((++i))]="lt6911uxe"
BUILT_MODULE_LOCATION[$i]="drivers/media/i2c"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

BUILT_MODULE_NAME[$((++i))]="lt6911gxd"
BUILT_MODULE_LOCATION[$i]="drivers/media/i2c"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

BUILT_MODULE_NAME[$((++i))]="imx415"
BUILT_MODULE_LOCATION[$i]="drivers/media/i2c"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

# IPU6 drivers from submodule
BUILT_MODULE_NAME[$((++i))]="intel-ipu6"
BUILT_MODULE_LOCATION[$i]="ipu6-drivers/drivers/media/pci/intel/ipu6"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

BUILT_MODULE_NAME[$((++i))]="intel-ipu6-isys"
BUILT_MODULE_LOCATION[$i]="ipu6-drivers/drivers/media/pci/intel/ipu6"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

BUILT_MODULE_NAME[$((++i))]="intel-ipu6-psys"
BUILT_MODULE_LOCATION[$i]="ipu6-drivers/drivers/media/pci/intel/ipu6/psys"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

if [ "$KERNEL_VER" -eq 6 ] && [ "$KERNEL_PATCH" -eq 12 ]; then

POST_ADD+=" drivers/media/pci/intel/Kconfig drivers/media/pci/intel/Makefile drivers/media/pci/intel/ipu-bridge.c"
PATCH[$((++j))]="0039-ipu-bridge-port-6.12.0-to-bkc.patch"
PATCH_MATCH[$j]="^(6.1[2]-intel)"

PATCH[$((++j))]="0040-ipu-bridge-6.12-makefile.patch"
PATCH_MATCH[$j]="^(6.1[2])"
PATCH[$((++j))]="0041-ipu-bridge-6.12-bkc-backport.patch"
PATCH_MATCH[$j]="^(6.1[2])"
PATCH[$((++j))]="0042-ipu-bridge-6.12-add-sensor.patch"
PATCH_MATCH[$j]="^(6.1[2])"

BUILT_MODULE_NAME[$((++i))]="ipu-bridge"
BUILT_MODULE_LOCATION[$i]="6.12.0/drivers/media/pci/intel"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

fi

if [ "$KERNEL_VER" -eq 6 ] && [ "$KERNEL_PATCH" -eq 17 ]; then
# IPU7 drivers from submodule
BUILT_MODULE_NAME[$((++i))]="intel-ipu7"
BUILT_MODULE_LOCATION[$i]="ipu7-drivers/drivers/media/pci/intel/ipu7"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

BUILT_MODULE_NAME[$((++i))]="intel-ipu7-isys"
BUILT_MODULE_LOCATION[$i]="ipu7-drivers/drivers/media/pci/intel/ipu7"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

BUILT_MODULE_NAME[$((++i))]="intel-ipu7-psys"
BUILT_MODULE_LOCATION[$i]="ipu7-drivers/drivers/media/pci/intel/ipu7/psys"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

POST_ADD+=" drivers/media/pci/intel/Kconfig drivers/media/pci/intel/Makefile drivers/media/pci/intel/ipu-bridge.c"
PATCH[$((++j))]="0040-ipu-bridge-6.17-makefile.patch"
PATCH_MATCH[$j]="^(6.1[7])"
PATCH[$((++j))]="0041-ipu-bridge-6.17-bkc-backport.patch"
PATCH_MATCH[$j]="^(6.1[7])"
PATCH[$((++j))]="0042-ipu-bridge-6.17-add-sensor.patch"
PATCH_MATCH[$j]="^(6.1[7])"

BUILT_MODULE_NAME[$((++i))]="ipu-bridge"
BUILT_MODULE_LOCATION[$i]="6.17.0/drivers/media/pci/intel"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

BUILT_MODULE_NAME[$((++i))]="videodev"
BUILT_MODULE_LOCATION[$i]="6.17.0/drivers/media/v4l2-core/"
DEST_MODULE_NAME[$i]="videodev"
DEST_MODULE_LOCATION[$i]="/updates"
STRIP[$i]=no

fi
