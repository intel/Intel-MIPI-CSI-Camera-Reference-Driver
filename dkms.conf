PACKAGE_NAME="ipu-camera-sensor"
PACKAGE_VERSION="0.1"
VERSION_SUFFIX="${PACKAGE_VERSION}"

MAKE="make KERNELRELEASE=$kernelver DRIVER_VERSION_SUFFIX='${VERSION_SUFFIX}' KERNEL_SRC=$kernel_source_dir"
CLEAN="make KERNELRELEASE=$kernelver KERNEL_SRC=$kernel_source_dir clean"

AUTOINSTALL="yes"

BUILD_EXCLUSIVE_KERNEL="^(6\.(12|17|18)([-.+].*|[a-z].*)?|7\.0([-.+].*|[a-z].*)?)$"
#Extract kernel version substring that is used to identify source directory for kernel modules
# i.e 6.12.8-intel-ese-experimental-lts-rt ==>  6.12.0
# i.e 6.17.0-oem-1011 ==>  6.17.0
# i.e 6.17rt-intel ==>  6.17.0
# i.e 6.18.6-intel-ese-experimental-lts-rt ==>  6.18.0
SELECTED_KERNEL=$(echo $kernelver | cut -d- -f1 | sed -r 's/([0-9]+\.[0-9]+).*/\1.0/g')
KERNEL_VER=$(echo $kernelver | cut -d. -f1)
KERNEL_PATCH=$(echo $kernelver | cut -d. -f2 | cut -d- -f1)

MODULE_PATH="drivers/media/i2c"
MODULE_DEST="/kernel/drivers/media/i2c/"

BUILD_EXCLUSIVE_CONFIG="CONFIG_VIDEO_V4L2_I2C"

POST_ADD="dkms-kernel-source.sh"

j=0

